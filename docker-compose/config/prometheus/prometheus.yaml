global:
  scrape_interval:     10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: [ 'localhost:9090' ]
        labels:
          alias: 'prometheus'
  - job_name: 'otel-collector'
    scrape_interval: 10s
    static_configs:
      - targets: [ 'otel-collector:8888' ]  # OpenTelemetry Collector Prometheus exporter
        labels:
          alias: 'otel-collector'
      - targets: [ 'otel-collector:8889' ]  # OpenTelemetry Metrics Prometheus exporter
        labels:
          alias: 'otel-metrics'
  - job_name: 'tempo'
    static_configs:
      - targets: [ 'tempo:3200' ]
        labels:
          alias: 'tempo'
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          alias: 'cadvisor'
